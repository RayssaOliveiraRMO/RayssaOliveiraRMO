name: generate animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: RayssaOliveiraRMO
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=ff6eb4&color_dots=#ff6eb4,#ffb3d9,#ff6eb4,#e91e8c,#c2185b
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=ff6eb4

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
