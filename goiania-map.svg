<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6eb4" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#ff6eb4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6eb4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a12" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d0008" stop-opacity="1"/>
    </radialGradient>
    <filter id="pinGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.9; r: 14; }
        50% { opacity: 0.4; r: 22; }
      }
      @keyframes ping {
        0% { r: 6; opacity: 1; }
        100% { r: 28; opacity: 0; }
      }
      .pulse-ring { animation: pulse 2s ease-in-out infinite; }
      .ping-ring { animation: ping 2s ease-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="420" fill="url(#bgGlow)" rx="12"/>

  <!-- Grid lines subtle -->
  <g stroke="#ff6eb4" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="0" y1="360" x2="400" y2="360"/>
    <line x1="80" y1="0" x2="80" y2="420"/>
    <line x1="160" y1="0" x2="160" y2="420"/>
    <line x1="240" y1="0" x2="240" y2="420"/>
    <line x1="320" y1="0" x2="320" y2="420"/>
  </g>

  <!-- Brazil simplified outline -->
  <path d="
    M 180,28
    L 220,25 L 255,32 L 275,28 L 295,35
    L 310,30 L 330,42 L 345,55 L 355,72
    L 360,90 L 358,110 L 350,125
    L 362,138 L 368,155 L 365,172
    L 355,185 L 358,200 L 350,215
    L 340,228 L 335,245 L 340,260
    L 335,278 L 322,290 L 308,298
    L 290,310 L 272,318 L 258,330
    L 240,340 L 225,355 L 215,368
    L 205,378 L 195,385 L 182,388
    L 168,382 L 158,370 L 150,355
    L 140,342 L 128,332 L 115,322
    L 100,308 L 90,292 L 82,275
    L 75,258 L 72,240 L 65,225
    L 60,208 L 58,190 L 62,172
    L 58,155 L 55,138 L 60,120
    L 52,105 L 48,88 L 55,72
    L 65,58 L 78,48 L 95,40
    L 112,35 L 130,30 L 150,27
    L 165,26 Z
  " fill="#1e0812" stroke="#ff6eb4" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Goiânia glow area -->
  <circle cx="198" cy="218" r="35" fill="url(#glow)" opacity="0.6"/>

  <!-- Ping animation rings -->
  <circle cx="198" cy="218" r="6" fill="none" stroke="#ff6eb4" stroke-width="1.5" opacity="0" class="ping-ring"/>
  <circle cx="198" cy="218" r="14" fill="#ff6eb4" fill-opacity="0.15" stroke="#ff6eb4" stroke-width="1" stroke-opacity="0.5" class="pulse-ring"/>

  <!-- Pin dot -->
  <circle cx="198" cy="218" r="6" fill="#ff6eb4" filter="url(#pinGlow)"/>
  <circle cx="198" cy="218" r="3" fill="#fff"/>

  <!-- Label Goiânia -->
  <rect x="210" y="208" width="82" height="22" rx="4" fill="#1a0812" stroke="#ff6eb4" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="251" y="223" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff6eb4" font-weight="bold">Goiânia, GO</text>

  <!-- Dots for other cities (subtle) -->
  <circle cx="215" cy="170" r="2" fill="#ff6eb4" opacity="0.2"/>
  <circle cx="290" cy="148" r="2" fill="#ff6eb4" opacity="0.2"/>
  <circle cx="155" cy="310" r="2" fill="#ff6eb4" opacity="0.2"/>
  <circle cx="240" cy="280" r="2" fill="#ff6eb4" opacity="0.2"/>
  <circle cx="120" cy="200" r="2" fill="#ff6eb4" opacity="0.2"/>

  <!-- Bottom label -->
  <text x="200" y="408" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff6eb4" opacity="0.5">Brasil 🇧🇷</text>
</svg>
